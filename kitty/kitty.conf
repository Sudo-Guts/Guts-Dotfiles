# /~~>( Fonds )<------------------------------------\

    font_family                     Iosevka Nerd Font
	bold_font                       auto
	italic_font                     auto
	bold_italic_font                auto

	font_size                       22.00

# /~~>( Cursor Customization )<---------------------\

	cursor                          #cc0403
	cursor_text_color               #111111
	cursor_shape                    underline
	cursor_shape_unfocused          underline
	cursor_beam_thickness           1.5
	cursor_underline_thickness      2.0
	cursor_blink_interval           -1

# /~~>( Scrollback )<-------------------------------\

    scrollback_lines                2000

# /~~>( Mouse )<------------------------------------\

    url_color                       #0087bd
	url_style                       datashed
	open_url_with                   default
	detect_urls                     yes
	show_hyperlink_targets          yes
	underline_hyperlinks            hover
	copy_on_select                  yes
	copy_on_select                  a1
	map shift+v                     paste_from_buffer a1

# /~~>( Window Layout )<----------------------------\ 

    remember_window_size            none
	initial_window_width            1500
    initial_window_height           800
    enabled_layouts                 all
   	window_border_width             1.0px
 	draw_minimal_borders            yes
    window_margin_width             1.0
    single_window_margin_width      -1
	window_padding_width            2.0 10.0 0.0 10.0 
	single_window_padding_width     -1
	placement_strategy              center
	active_border_color             #cb1ed1
	inactive_border_color           #23fd00
	hide_window_decorations         yes
    #window_logo_path               /home/guts/Im√°genes/Yin_Yang.png
	window_logo_position            center
	window_logo_scale               1.0
	window_logo_scale               50 50

# /~~>( Tab bar )<----------------------------------\  

    tab_bar_edge                    bottom
    tab_bar_margin_width            1.0
    tab_bar_margin_height           5.0 0.0
    tab_bar_style                   powerline
    tab_bar_align                   left
    tab_bar_min_tabs                1
    tab_powerline_style             angled
    tab_activity_symbol             none
    tab_title_max_length            0 
    tab_title_template              "{fmt.fg._cc0403}ůįę£  {fmt.fg._0d73cc}{title}"
    active_tab_title_template       "{fmt.fg._f2201f}ůįęĘ  {fmt.fg._cd1ed1}{title}"
    active_tab_foreground           #ffffff
    active_tab_background           #000000
    active_tab_font_style           D2Coding Nerd Font
    inactive_tab_foreground         #ffffff
    inactive_tab_background         #000000
    inactive_tab_font_style         D2Coding Nerd Font
    tab_bar_background              none
    tab_bar_margin_color            none

# /~~>( Color scheme )<-----------------------------\

    foreground                      #dddddd
    background                      #000000
    background_opacity              0.8
    background_image                none
    background_image_layout         centered
    dynamic_background_opacity      no
    background_tint                 0.0
 
# /~~>( Keyboard shortcuts )<-----------------------\

    # Clipboard => Portapapeles

    map ctrl+c                  copy_to_clipboard
    map ctrl+v                  paste_from_clipboard
    map ctrl+s                  paste_from_selection

    # Scrolling => Desplazamiento

    map ctrl+shift+page_up      scroll_line_up
    map ctrl+shift+page_down    scroll_line_down
    #map ctrl+shift+page_up      scroll_page_up
    #map ctrl+shift+page_down    scroll_page_down
    map ctrl+shift+home         scroll_home
    map ctrl+shift+end          scroll_end

    # Window management => Gesti√≥n de ventanas

    map ctrl+shift+.                  next_window
    map ctrl+shift+,                  previous_window
    map ctrl+shift+enter              new_window
    map ctrl+shift+backspace          close_window

    # Tab management => Gesti√≥n de pesta√Īas 

    map ctrl+.            next_tab
    map ctrl+,            previous_tab
    map ctrl+enter        new_tab
    map ctrl+backspace    close_tab
    map ctrl+right        move_tab_forward
    map ctrl+left         move_tab_backward

    # Layout management => Gesti√≥n de dise√Īo

    map ctrl+shift+right              next_layout
    map ctrl+shift+left               last_used_layout
    
    # Retraso en milisegundos antes de que empiece a repetir la tecla (por defecto 300)
    repeat_delay 400

# Velocidad de repetici√≥n en teclas por segundo (por defecto 25)
    repeat_rate 20
